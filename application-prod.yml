server:
  port: 80

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

knife4j:
  enable: false

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

app:
  jwt:
    secret: 请替换为至少32字符的随机密钥
  storage:
    image-upload: /data/storage/images
    filestorage-root: /data/storage/files
  super-secret: 请替换为强随机密钥
